<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Pricing Cards</title>
</head>
<body>
    <div class="flex bg-blue-950 h-screen justify-center items-center">
        <div class="flex flex-col justify-center items-center text-white font-serif border-8 rounded-2xl border-blue-300 p-9 m-4 hover:border-violet-600 shadow-lg transition-transform duration-300 hover:scale-105">
            <div class="m-3">
            <p class="text-1xl">BASIC</p>
            <p class="text-4xl">100GB</p>
            <p>$1.99/month</p>
            <button class="border-2 p-2 m-3 border-violet-600 hover:bg-violet-600 rounded-2xl">Purchase</button>
            </div>
            <div class="m-3 p-3 border-t-2 border-gray-600">
                <p>100 GB storage</p>
                <p>Option to add members</p>
                <p>Extra member benefits</p>
            </div>
        </div>
          <div class="flex flex-col justify-center items-center text-white font-serif border-8 rounded-2xl border-blue-300 p-9 m-4 hover:border-violet-600 shadow-lg transition-transform duration-300 hover:scale-105">
            <div class="m-3">
            <p class="text-1xl">STANDARD</p>
            <p class="text-4xl">200GB</p>
            <p>$3.99/month</p>
            <button class="border-2 p-2 m-3 border-violet-600 hover:bg-violet-600 rounded-2xl">Purchase</button>
            </div>
            <div class="m-3 p-3 border-t-2 border-gray-600">
                <p>200 GB storage</p>
                <p>Option to add members</p>
                <p>Extra member benefits</p>
            </div>
        </div>
          <div class="flex flex-col justify-center items-center text-white font-serif border-8 rounded-2xl border-blue-300 p-9 m-4 hover:border-violet-600 shadow-lg transition-transform duration-300 hover:scale-105">
            <div class="m-3">
            <p class="text-1xl">PREMIUM</p>
            <p class="text-4xl">2TB</p>
            <p>$8.99/month</p>
            <button class="border-2 p-2 m-3 border-violet-600 hover:bg-violet-600 rounded-2xl">Purchase</button>
            </div>
            <div class="m-3 p-3 border-t-2 border-gray-600">
                <p>2TB storage</p>
                <p>Option to add members</p>
                <p>Extra member benefits</p>
            </div>
        </div>
    </div>
</body>
</html>
